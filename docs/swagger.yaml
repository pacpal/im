basePath: /api/v1
definitions:
  handler.AddFriendRequest:
    properties:
      friend_id:
        example: "123456"
        type: string
      reason:
        example: 想加你为好友
        type: string
    type: object
  handler.AddFriendResponse:
    properties:
      request_id:
        example: "987654321"
        type: string
      status:
        example: pending
        type: string
    type: object
  handler.ChangeGroupMemberRequest:
    properties:
      role:
        example: 1
        type: integer
    type: object
  handler.ChangeGroupMemberResponse:
    properties:
      role:
        example: admin
        type: string
      success:
        example: true
        type: boolean
    type: object
  handler.CreateGroupRequest:
    properties:
      description:
        example: 这是一个技术交流群
        type: string
      name:
        example: 技术交流群
        type: string
    type: object
  handler.CreateGroupResponse:
    properties:
      description:
        example: 这是一个技术交流群
        type: string
      group_id:
        example: "789012"
        type: string
      name:
        example: 技术交流群
        type: string
      owner_id:
        example: "123456789"
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  handler.FriendInfo:
    properties:
      avatar:
        example: https://example.com/avatar.jpg
        type: string
      friend_id:
        example: "123456789"
        type: string
      nickname:
        example: My Friend
        type: string
      status:
        example: 1
        type: integer
      username:
        example: frienduser
        type: string
    type: object
  handler.FriendRequestInfo:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      from_name:
        example: sender
        type: string
      from_user_id:
        example: "123456789"
        type: string
      reason:
        example: 想加你为好友
        type: string
      request_id:
        example: "987654321"
        type: string
      status:
        example: pending
        type: string
    type: object
  handler.FriendRequestsResponse:
    properties:
      requests:
        items:
          $ref: '#/definitions/handler.FriendRequestInfo'
        type: array
    type: object
  handler.FriendsListResponse:
    properties:
      friends:
        items:
          $ref: '#/definitions/handler.FriendInfo'
        type: array
    type: object
  handler.GetPendingGroupJoinRequestsBody:
    properties:
      group_id:
        example: "789012"
        type: string
    type: object
  handler.GroupInfo:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      description:
        example: 这是一个技术交流群
        type: string
      group_id:
        example: "789012"
        type: string
      member_count:
        example: 50
        type: integer
      name:
        example: 技术交流群
        type: string
      owner_id:
        example: "123456789"
        type: string
    type: object
  handler.GroupJoinRequestInfo:
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      reason:
        example: 想加入群组
        type: string
      request_id:
        example: "987654321"
        type: string
      status:
        example: pending
        type: string
      user_id:
        example: "123456789"
        type: string
      username:
        example: applicant
        type: string
    type: object
  handler.GroupJoinRequestsResponse:
    properties:
      requests:
        items:
          $ref: '#/definitions/handler.GroupJoinRequestInfo'
        type: array
    type: object
  handler.GroupMemberInfo:
    properties:
      joined_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      member_id:
        example: "123456789"
        type: string
      nickname:
        example: 群成员1
        type: string
      role:
        example: member
        type: string
      username:
        example: member1
        type: string
    type: object
  handler.GroupMembersResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/handler.GroupMemberInfo'
        type: array
    type: object
  handler.JoinGroupRequest:
    properties:
      group_id:
        example: "789012"
        type: string
      reason:
        example: 想加入群组
        type: string
    type: object
  handler.JoinGroupResponse:
    properties:
      request_id:
        example: "987654321"
        type: string
      status:
        example: pending
        type: string
    type: object
  handler.LeaveGroupResponse:
    properties:
      success:
        example: true
        type: boolean
    type: object
  handler.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: testuser
        type: string
    type: object
  handler.LoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user_id:
        example: "123456789"
        type: string
      username:
        example: testuser
        type: string
    type: object
  handler.MarkAllAsReadResponse:
    properties:
      count:
        example: 10
        type: integer
      success:
        example: true
        type: boolean
    type: object
  handler.MarkAsReadResponse:
    properties:
      success:
        example: true
        type: boolean
    type: object
  handler.OfflineMessageInfo:
    properties:
      content:
        example: 你好
        type: string
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      msg_id:
        example: msg123456
        type: string
      msg_type:
        example: text
        type: string
      sender_id:
        example: "123456789"
        type: string
      sender_name:
        example: sender
        type: string
    type: object
  handler.OfflineMessagesResponse:
    properties:
      messages:
        items:
          $ref: '#/definitions/handler.OfflineMessageInfo'
        type: array
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      nickname:
        example: Test User
        type: string
      password:
        example: password123
        type: string
      username:
        example: testuser
        type: string
    type: object
  handler.RegisterResponse:
    properties:
      email:
        example: user@example.com
        type: string
      nickname:
        example: Test User
        type: string
      user_id:
        example: "123456789"
        type: string
      username:
        example: testuser
        type: string
    type: object
  handler.RemoveFriendResponse:
    properties:
      success:
        example: true
        type: boolean
    type: object
  handler.RemoveGroupMemberResponse:
    properties:
      success:
        example: true
        type: boolean
    type: object
  handler.ReplyFriendRequestBody:
    properties:
      accept:
        example: true
        type: boolean
    type: object
  handler.ReplyFriendResponse:
    properties:
      status:
        example: accepted
        type: string
      success:
        example: true
        type: boolean
    type: object
  handler.ReplyGroupJoinRequestBody:
    properties:
      accept:
        example: true
        type: boolean
    type: object
  handler.ReplyGroupJoinResponse:
    properties:
      status:
        example: accepted
        type: string
      success:
        example: true
        type: boolean
    type: object
  handler.SendMessageRequest:
    properties:
      content:
        example: 你好
        type: string
      msg_type:
        example: text
        type: string
      receiver_id:
        example: "123456"
        type: string
    type: object
  handler.SendMessageResponse:
    properties:
      content:
        example: 你好
        type: string
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      msg_id:
        example: msg123456
        type: string
      msg_type:
        example: text
        type: string
      receiver_id:
        example: "987654321"
        type: string
      sender_id:
        example: "123456789"
        type: string
    type: object
  handler.UnreadCountResponse:
    properties:
      count:
        example: 5
        type: integer
    type: object
  handler.UserGroupsResponse:
    properties:
      groups:
        items:
          $ref: '#/definitions/handler.GroupInfo'
        type: array
    type: object
  handler.UserInfo:
    properties:
      avatar:
        example: https://example.com/avatar.jpg
        type: string
      email:
        example: user@example.com
        type: string
      nickname:
        example: Test User
        type: string
      status:
        example: 1
        type: integer
      user_id:
        example: "123456789"
        type: string
      username:
        example: testuser
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: IM 即时通讯系统 Gateway 服务 API 文档，包含用户认证、好友管理、群组管理、消息系统等接口。
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: IM 即时通讯系统 API
  version: "1.0"
paths:
  /friend_requests:
    get:
      consumes:
      - application/json
      description: 获取当前用户收到的所有待处理好友请求
      produces:
      - application/json
      responses:
        "200":
          description: 好友请求列表
          schema:
            $ref: '#/definitions/handler.FriendRequestsResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取待处理好友请求
      tags:
      - 好友
  /friend_requests/{request_id}:
    put:
      consumes:
      - application/json
      description: 接受或拒绝好友请求
      parameters:
      - description: 好友请求ID
        in: path
        name: request_id
        required: true
        type: string
      - description: 回复参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ReplyFriendRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: 回复成功
          schema:
            $ref: '#/definitions/handler.ReplyFriendResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 回复好友请求
      tags:
      - 好友
  /friends:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有好友
      produces:
      - application/json
      responses:
        "200":
          description: 好友列表
          schema:
            $ref: '#/definitions/handler.FriendsListResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取好友列表
      tags:
      - 好友
    post:
      consumes:
      - application/json
      description: 发送好友请求给指定用户
      parameters:
      - description: 添加好友请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.AddFriendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 好友请求已发送
          schema:
            $ref: '#/definitions/handler.AddFriendResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 添加好友
      tags:
      - 好友
  /friends/{friend_id}:
    delete:
      consumes:
      - application/json
      description: 从好友列表中删除指定好友
      parameters:
      - description: 好友ID
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/handler.RemoveFriendResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除好友
      tags:
      - 好友
  /group/{id}/members/{member_id}:
    post:
      consumes:
      - application/json
      description: 群主修改群组成员的角色（管理员/普通成员）
      parameters:
      - description: 群组ID
        in: path
        name: id
        required: true
        type: string
      - description: 成员ID
        in: path
        name: member_id
        required: true
        type: string
      - description: 角色参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ChangeGroupMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 修改成功
          schema:
            $ref: '#/definitions/handler.ChangeGroupMemberResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 修改群组成员角色
      tags:
      - 群组
  /group_requests:
    get:
      consumes:
      - application/json
      description: 群主获取待处理的群组加入请求列表
      parameters:
      - description: 群组ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.GetPendingGroupJoinRequestsBody'
      produces:
      - application/json
      responses:
        "200":
          description: 加入请求列表
          schema:
            $ref: '#/definitions/handler.GroupJoinRequestsResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取待处理群组加入请求
      tags:
      - 群组
    post:
      consumes:
      - application/json
      description: 发送加入群组的申请请求
      parameters:
      - description: 加入群组请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.JoinGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 申请已发送
          schema:
            $ref: '#/definitions/handler.JoinGroupResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 申请加入群组
      tags:
      - 群组
  /group_requests/{request_id}:
    put:
      consumes:
      - application/json
      description: 群主接受或拒绝加入群组的请求
      parameters:
      - description: 请求ID
        in: path
        name: request_id
        required: true
        type: string
      - description: 回复参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ReplyGroupJoinRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: 回复成功
          schema:
            $ref: '#/definitions/handler.ReplyGroupJoinResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 回复群组加入请求
      tags:
      - 群组
  /groups:
    get:
      consumes:
      - application/json
      description: 获取当前用户加入的所有群组
      produces:
      - application/json
      responses:
        "200":
          description: 群组列表
          schema:
            $ref: '#/definitions/handler.UserGroupsResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取用户群组列表
      tags:
      - 群组
    post:
      consumes:
      - application/json
      description: 创建新的群组
      parameters:
      - description: 创建群组请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 群组创建成功
          schema:
            $ref: '#/definitions/handler.CreateGroupResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建群组
      tags:
      - 群组
  /groups/{id}:
    get:
      consumes:
      - application/json
      description: 根据群组ID获取群组详细信息
      parameters:
      - description: 群组ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 群组信息
          schema:
            $ref: '#/definitions/handler.GroupInfo'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取群组信息
      tags:
      - 群组
  /groups/{id}/members:
    get:
      consumes:
      - application/json
      description: 获取指定群组的所有成员
      parameters:
      - description: 群组ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 群组成员列表
          schema:
            $ref: '#/definitions/handler.GroupMembersResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取群组成员列表
      tags:
      - 群组
  /groups/{id}/members/{member_id}:
    delete:
      consumes:
      - application/json
      description: 群主或管理员移除群组成员
      parameters:
      - description: 群组ID
        in: path
        name: id
        required: true
        type: string
      - description: 成员ID
        in: path
        name: member_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 移除成功
          schema:
            $ref: '#/definitions/handler.RemoveGroupMemberResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 移除群组成员
      tags:
      - 群组
  /groups/{id}/members/me:
    delete:
      consumes:
      - application/json
      description: 用户退出指定的群组
      parameters:
      - description: 群组ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 退出成功
          schema:
            $ref: '#/definitions/handler.LeaveGroupResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 退出群组
      tags:
      - 群组
  /login:
    post:
      consumes:
      - application/json
      description: 用户登录获取 JWT Token
      parameters:
      - description: 登录请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回 Token
          schema:
            $ref: '#/definitions/handler.LoginResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: 用户登录
      tags:
      - 用户认证
  /messages:
    post:
      consumes:
      - application/json
      description: 发送消息给指定用户或群组
      parameters:
      - description: 发送消息请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 消息发送成功
          schema:
            $ref: '#/definitions/handler.SendMessageResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 发送消息
      tags:
      - 消息
  /messages/{id}/read:
    put:
      consumes:
      - application/json
      description: 将指定消息标记为已读状态
      parameters:
      - description: 消息ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 标记成功
          schema:
            $ref: '#/definitions/handler.MarkAsReadResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 标记消息已读
      tags:
      - 消息
  /messages/offline:
    get:
      consumes:
      - application/json
      description: 获取当前用户的离线消息列表
      produces:
      - application/json
      responses:
        "200":
          description: 离线消息列表
          schema:
            $ref: '#/definitions/handler.OfflineMessagesResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取离线消息
      tags:
      - 消息
  /messages/read:
    put:
      consumes:
      - application/json
      description: 将当前用户的所有消息标记为已读状态
      produces:
      - application/json
      responses:
        "200":
          description: 标记成功
          schema:
            $ref: '#/definitions/handler.MarkAllAsReadResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 标记所有消息已读
      tags:
      - 消息
  /messages/unread/count:
    get:
      consumes:
      - application/json
      description: 获取当前用户的未读消息数量
      produces:
      - application/json
      responses:
        "200":
          description: 未读消息数
          schema:
            $ref: '#/definitions/handler.UnreadCountResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取未读消息数
      tags:
      - 消息
  /register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号
      parameters:
      - description: 注册请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/handler.RegisterResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: 用户注册
      tags:
      - 用户认证
  /users/{id}:
    get:
      consumes:
      - application/json
      description: 根据用户ID获取用户详细信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/handler.UserInfo'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取用户信息
      tags:
      - 用户
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
