server:
  name: message-service
  http_port: 8083
  grpc_port: 50053

etcd:
  endpoints:
    - localhost:2379
  dial_timeout: 5s
  ttl: 30

database:
  postgres:
    host: localhost
    port: 5432
    user: postgres
    password: postgres
    dbname: im_db
    sslmode: disable
    max_open: 100
    max_idle: 10
  mongodb:
    uri: mongodb://localhost:27017
    database: im_messages
    collection: messages

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

rabbitmq:
  url: amqp://guest:guest@localhost:5672/
  exchange: im_exchange
  queue_prefix: im_

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_period: 30s
  pong_wait: 60s
  max_message_size: 65536

log:
  level: info
  format: json
