syntax = "proto3";

package group;

option go_package = "IM/api/gen/group;group";

import "common/common.proto";

message CreateGroupRequest {
    string owner_id = 1;
    string name = 2;
    string description = 3;
    string image_url = 4;
}

message CreateGroupResponse {
    string group_id = 1;
    string name = 2;
}

message GetGroupRequest {
    string group_id = 1;
}

message GroupInfo {
    string id = 1;
    string name = 2;
    string description = 3;
    string owner_id = 4;
    string type = 5;
    string image_url = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
    int32 member_count = 9;
}

message UpdateGroupRequest {
    string group_id = 1;
    string owner_id = 2;
    string name = 3;
    string description = 4;
    string image_url = 5;
}

message DeleteGroupRequest {
    string group_id = 1;
    string owner_id = 2;
}

message JoinGroupRequest {
    string user_id = 1;
    string group_id = 2;
    string reason = 3;
}

message LeaveGroupRequest {
    string user_id = 1;
    string group_id = 2;
}

message ReplyGroupJoinRequest {
    string owner_id = 1;
    string request_id = 2;
    bool accept = 3;
}

message GetMembersRequest {
    string group_id = 1;
}

message MemberInfo {
    string user_id = 1;
    string name = 2;
    string avatar_url = 3;
    int32 role = 4;
    int64 joined_at = 5;
    string nickname = 6;
}

message GetMembersResponse {
    repeated MemberInfo members = 1;
}

message RemoveMemberRequest {
    string group_id = 1;
    string owner_id = 2;
    string member_id = 3;
}

message GetUserGroupsRequest {
    string user_id = 1;
}

message GetUserGroupsResponse {
    repeated GroupInfo groups = 1;
}

message GetPendingGroupRequestsRequest {
    string group_id = 1;
    string owner_id = 2;
}

message GroupJoinRequestInfo {
    string id = 1;
    string user_id = 2;
    string group_id = 3;
    string reason = 4;
    string status = 5;
    int64 created_at = 6;
    string user_name = 7;
    string user_avatar = 8;
}

message GetPendingGroupRequestsResponse {
    repeated GroupJoinRequestInfo requests = 1;
}

message TransferOwnerRequest {
    string group_id = 1;
    string owner_id = 2;
    string new_owner_id = 3;
}
service GroupService {
    rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
    rpc GetGroup(GetGroupRequest) returns (GroupInfo);
    rpc UpdateGroup(UpdateGroupRequest) returns (common.Response);
    rpc DeleteGroup(DeleteGroupRequest) returns (common.Response);
    rpc JoinGroup(JoinGroupRequest) returns (common.Response);
    rpc LeaveGroup(LeaveGroupRequest) returns (common.Response);
    rpc ReplyGroupJoins(ReplyGroupJoinRequest) returns (common.Response);
    rpc GetMembers(GetMembersRequest) returns (GetMembersResponse);
    rpc RemoveMember(RemoveMemberRequest) returns (common.Response);
    rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse);
    rpc GetPendingGroupRequests(GetPendingGroupRequestsRequest) returns (GetPendingGroupRequestsResponse);
    rpc TransferOwner(TransferOwnerRequest) returns (common.Response);
}

